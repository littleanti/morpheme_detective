<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#FF7757">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>형태소 탐정</title>
  <link rel="manifest" href="manifest.webmanifest">

  <!-- §10 폰트 — Jua(제목) + Gowun Dodum(본문) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">

  <!-- CSS 로드 순서 유지 -->
  <link rel="stylesheet" href="src/css/tokens.css">
  <link rel="stylesheet" href="src/css/base.css">
  <link rel="stylesheet" href="src/css/screens.css">
  <link rel="stylesheet" href="src/css/stage.css">
  <link rel="stylesheet" href="src/css/magnifier.css">
  <link rel="stylesheet" href="src/css/word-blocks.css">
  <link rel="stylesheet" href="src/css/morph.css">
  <link rel="stylesheet" href="src/css/card-deck.css">
</head>
<body>

  <!-- ── 시작 화면 F1·F2 (§10 규격) ──────────────────────────── -->
  <section id="start-screen" class="screen active" aria-label="시작 화면">
    <button id="btn-settings" class="btn small ghost start-settings-btn"
            aria-label="설정 열기">⚙️ 설정</button>

    <div class="start-content">
      <h1 class="start-title">🔍 형태소 탐정</h1>
      <p class="start-subtitle">
        익숙한 단어 속 숨은 한자를 찾아라!<br>
        <small style="font-size:0.85em;opacity:0.7">초등 1·2학년 한자 형태소 인식 게임</small>
      </p>
      <div class="start-cta">
        <!-- F1: ≥64dp 큰 버튼 -->
        <button id="btn-start" class="btn big" aria-label="탐정 시작">
          🔍 탐정 시작
        </button>
      </div>
    </div>
  </section>

  <!-- ── 사건 선택 화면 F3 — main.js가 stages.js 기반으로 동적 렌더 ── -->
  <section id="stage-select-screen" class="screen" aria-label="사건 선택">
    <div class="stage-select-wrap">
      <h2 class="stage-select-title">🕵️ 오늘의 사건을 선택하세요</h2>
      <div id="stage-card-list" class="stage-card-list" role="list"
           aria-label="사건 목록"></div>
      <button id="btn-stage-select-back" class="btn small ghost">← 돌아가기</button>
    </div>
  </section>

  <!-- ── 플레이 화면 (M2 일러스트+Hit Zone, M3~M5에서 확장) ─── -->
  <section id="play-screen" class="screen" aria-label="게임 플레이">
    <div class="stage-canvas" id="stage-canvas">
      <!-- M2: stage.js 가 주차장 SVG + hit zone overlay 삽입 -->
    </div>
    <div class="stage-dock" id="stage-dock">
      <!-- M6: 상단 바 — 홈 버튼 · 진행률 · 미션 보기 -->
      <div class="dock-top-bar">
        <button id="btn-play-back" class="btn small ghost" aria-label="홈으로">← 홈</button>
        <div class="progress-bar" aria-live="polite">
          <span id="progress-stars" class="progress-stars"></span>
          <span id="progress-count" class="progress-count"></span>
        </div>
        <button id="btn-show-mission" class="btn small" hidden aria-label="미션 보기">미션 보기</button>
      </div>
      <p class="dock-hint" id="dock-hint">반짝이는 곳을 탭하거나 클릭하세요!</p>
      <!-- M3: word-block — DOM 순서 고정 (word-block.js가 ensureContainer로 재사용) -->
      <div id="word-block-container" class="word-block-container" aria-live="polite"></div>
      <!-- M4: morph -->
      <div id="morph-container" class="morph-container" aria-hidden="true">
        <div class="morph-backdrop"></div>
      </div>
      <!-- M5: card-deck — card-deck.js가 동적으로 카드 삽입 -->
      <div id="card-deck-container" aria-label="어휘 카드" aria-live="polite"></div>
    </div>
  </section>

  <!-- ── 설정 화면 (M7에서 구현) ──────────────────────────────── -->
  <section id="settings-screen" class="screen" aria-label="설정">
    <div class="card-screen">
      <h2 class="settings-header">⚙️ 설정</h2>
      <p style="color:var(--color-text-dim);font-size:0.9rem">M7에서 구현 예정</p>
      <br>
      <button id="btn-settings-back" class="btn small ghost">← 돌아가기</button>
    </div>
  </section>

  <!-- ── 미션 완료 화면 — mission.js가 card-screen 내부를 동적 렌더 ── -->
  <section id="mission-screen" class="screen" aria-label="미션 완료">
    <div class="card-screen" style="overflow-y:auto"></div>
  </section>

  <!-- ── 종료 화면 — game.js가 card-screen 내부를 동적 렌더 ──────── -->
  <section id="end-screen" class="screen" aria-label="종료">
    <div class="card-screen" style="overflow-y:auto"></div>
  </section>

  <!-- ── 도감(컬렉션) 화면 — F14 (M7) ───────────────────────────── -->
  <section id="collection-screen" class="screen" aria-label="한자 도감">
    <div class="card-screen" style="overflow-y:auto"></div>
  </section>

  <script type="module" src="src/js/main.js"></script>
</body>
</html>
