<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid meet" aria-label="주차장 사건 일러스트">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#87CEEB"/>
      <stop offset="0.7" stop-color="#FFE4B5"/>
      <stop offset="1"   stop-color="#FFD166"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a4a4a"/>
      <stop offset="1" stop-color="#2a2a2a"/>
    </linearGradient>
  </defs>

  <!-- ─── 하늘 ─── -->
  <rect x="0" y="0" width="1600" height="540" fill="url(#sky)"/>

  <!-- 해 -->
  <circle cx="200" cy="160" r="90" fill="#FFD166" opacity="0.35"/>
  <circle cx="200" cy="160" r="60" fill="#FFD166" opacity="0.95"/>

  <!-- 구름 -->
  <g fill="#fff" opacity="0.85">
    <ellipse cx="500"  cy="180" rx="80"  ry="25"/>
    <ellipse cx="540"  cy="170" rx="60"  ry="22"/>
    <ellipse cx="1100" cy="220" rx="100" ry="28"/>
    <ellipse cx="1150" cy="210" rx="70"  ry="25"/>
  </g>

  <!-- ─── 원경 건물 ─── -->
  <g>
    <rect x="0"   y="380" width="220" height="160" fill="#6b6e82" opacity="0.75"/>
    <rect x="200" y="420" width="180" height="120" fill="#4a4d5a" opacity="0.75"/>
    <rect x="370" y="350" width="180" height="190" fill="#6b6e82" opacity="0.75"/>
    <rect x="540" y="400" width="160" height="140" fill="#4a4d5a" opacity="0.75"/>
    <rect x="690" y="380" width="140" height="160" fill="#6b6e82" opacity="0.7"/>
    <!-- 창문 -->
    <g fill="#FFD166" opacity="0.65">
      <rect x="40"  y="420" width="20" height="22"/>
      <rect x="80"  y="420" width="20" height="22"/>
      <rect x="120" y="420" width="20" height="22"/>
      <rect x="40"  y="470" width="20" height="22"/>
      <rect x="80"  y="470" width="20" height="22"/>
      <rect x="120" y="470" width="20" height="22"/>
      <rect x="240" y="450" width="18" height="20"/>
      <rect x="280" y="450" width="18" height="20"/>
      <rect x="320" y="450" width="18" height="20"/>
      <rect x="400" y="380" width="20" height="22"/>
      <rect x="440" y="380" width="20" height="22"/>
      <rect x="480" y="380" width="20" height="22"/>
      <rect x="400" y="430" width="20" height="22"/>
      <rect x="440" y="430" width="20" height="22"/>
      <rect x="480" y="430" width="20" height="22"/>
      <rect x="730" y="420" width="20" height="22"/>
      <rect x="770" y="420" width="20" height="22"/>
    </g>
  </g>

  <!-- ─── 나무 ─── -->
  <g>
    <rect cx="1190" x="1175" y="460" width="32" height="80" fill="#5C4033"/>
    <circle cx="1191" cy="450" r="64" fill="#6BCAB8"/>
    <circle cx="1150" cy="438" r="42" fill="#4fa192"/>
    <circle cx="1232" cy="445" r="44" fill="#4fa192"/>
    <circle cx="1191" cy="410" r="38" fill="#6BCAB8"/>
  </g>

  <!-- ─── 아스팔트 ─── -->
  <rect x="0" y="540" width="1600" height="360" fill="url(#ground)"/>

  <!-- 주차선 (원근감) -->
  <g stroke="#FFFFFF" stroke-width="6" opacity="0.85" fill="none">
    <path d="M 100,600 L 90,900"/>
    <path d="M 350,600 L 360,900"/>
    <path d="M 600,600 L 615,900"/>
    <path d="M 850,600 L 870,900"/>
    <path d="M 1100,600 L 1125,900"/>
    <path d="M 1350,600 L 1380,900"/>
    <line x1="0" y1="600" x2="1600" y2="600" stroke-dasharray="14 8"/>
  </g>

  <!-- ─── 자동차 #2 (배경, 파랑) ─── -->
  <g id="car-2-visual" aria-hidden="true">
    <path d="M 850,768 L 880,720 L 1050,720 L 1080,768 L 1080,832 L 850,832 Z"
          fill="#4a90e2" stroke="#2D3047" stroke-width="4"/>
    <path d="M 895,733 L 905,725 L 1025,725 L 1035,733 L 1035,762 L 895,762 Z"
          fill="#87CEEB" stroke="#2D3047" stroke-width="2"/>
    <line x1="965" y1="725" x2="965" y2="762" stroke="#2D3047" stroke-width="2"/>
    <circle cx="895"  cy="832" r="26" fill="#2D3047"/>
    <circle cx="895"  cy="832" r="13" fill="#888"/>
    <circle cx="1035" cy="832" r="26" fill="#2D3047"/>
    <circle cx="1035" cy="832" r="13" fill="#888"/>
    <circle cx="858"  cy="780" r="6"  fill="#FFD166"/>
  </g>

  <!-- ─── 자동차 #1 (전경, 빨강) ─── -->
  <g id="car-1-visual" aria-hidden="true">
    <path d="M 200,752 L 245,680 L 460,680 L 500,752 L 500,832 L 200,832 Z"
          fill="#E84545" stroke="#2D3047" stroke-width="5"/>
    <path d="M 270,700 L 285,690 L 410,690 L 425,700 L 425,742 L 270,742 Z"
          fill="#87CEEB" stroke="#2D3047" stroke-width="3"/>
    <line x1="345" y1="690" x2="345" y2="742" stroke="#2D3047" stroke-width="3"/>
    <circle cx="260" cy="832" r="38" fill="#2D3047"/>
    <circle cx="260" cy="832" r="20" fill="#666"/>
    <circle cx="260" cy="832" r="6"  fill="#2D3047"/>
    <circle cx="450" cy="832" r="38" fill="#2D3047"/>
    <circle cx="450" cy="832" r="20" fill="#666"/>
    <circle cx="450" cy="832" r="6"  fill="#2D3047"/>
    <circle cx="210" cy="765" r="9"  fill="#FFD166"/>
    <rect   x="345" y="765" width="22" height="6" rx="2" fill="#2D3047"/>
  </g>

  <!-- ─── 주차장 표지판 ─── -->
  <g id="sign-visual" aria-hidden="true">
    <!-- 기둥 -->
    <rect x="1383" y="500" width="14" height="220" fill="#666"/>
    <rect x="1370" y="720" width="40" height="14" fill="#444"/>
    <!-- 표지판 -->
    <rect x="1255" y="360" width="270" height="155" rx="14"
          fill="#FF7757" stroke="#2D3047" stroke-width="6"/>
    <rect x="1270" y="375" width="240" height="125" rx="8"
          fill="none" stroke="#FFE4B5" stroke-width="2" opacity="0.7"/>
    <text x="1305" y="465" font-family="'Jua', sans-serif" font-size="78" fill="#FFFFFF" font-weight="bold">P</text>
    <text x="1370" y="465" font-family="'Jua', sans-serif" font-size="46" fill="#FFFFFF">주차장</text>
  </g>

  <!-- 힌트 영역(<g id="hit-zone-overlay">)은 stage.js 에서 동적으로 추가됨 -->
</svg>
